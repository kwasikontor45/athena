<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athena — Instructor Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9a84c;
      --gold-d:  rgba(201,168,76,0.15);
      --gold-b:  rgba(201,168,76,0.25);
      --bg:      #0a0e1a;
      --surface: #0d1221;
      --panel:   #0d1525;
      --text:    rgba(255,255,255,0.85);
      --dim:     rgba(255,255,255,0.45);
      --red:     #c47777;
      --green:   #1d9e75;
      --amber:   #d29922;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Auth screen ── */
    .auth {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 24px;
    }

    .auth__logo { font-size: 36px; }
    .auth__title { font-size: 20px; font-weight: 700; color: var(--gold); }
    .auth__sub { font-size: 13px; color: var(--dim); }

    .auth__form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    /* ── Shared input/button ── */
    input, select {
      background: var(--surface);
      border: 1px solid var(--gold-b);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: var(--gold); }
    input::placeholder { color: var(--dim); }

    button {
      background: var(--gold);
      border: none;
      border-radius: 7px;
      color: #111;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #e5c04a; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--gold-b);
      color: var(--dim);
      font-weight: 400;
    }

    .btn-ghost:hover { background: var(--gold-d); color: var(--text); }

    /* ── App shell ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    #app.visible { display: flex; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 24px;
      height: 52px;
      background: var(--panel);
      border-bottom: 1px solid var(--gold-b);
      flex-shrink: 0;
    }

    .topbar__brand { font-size: 15px; font-weight: 700; color: var(--gold); }
    .topbar__sep { color: var(--gold-b); }

    .topbar__cohort-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .topbar__cohort-row input { max-width: 160px; padding: 5px 10px; font-size: 12px; }
    .topbar__cohort-row button { padding: 5px 14px; font-size: 12px; }

    .topbar__logout {
      margin-left: auto;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--dim);
      font-size: 12px;
      font-weight: 400;
      padding: 4px 12px;
      border-radius: 6px;
    }

    .topbar__logout:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* ── Main content ── */
    .main { flex: 1; padding: 28px 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-bottom: 14px;
    }

    /* ── Stat cards ── */
    .stat-row {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--gold-b);
      border-radius: 10px;
      padding: 16px 18px;
    }

    .stat-card__val { font-size: 28px; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-card__label { font-size: 12px; color: var(--dim); margin-top: 4px; }

    /* ── Learner table ── */
    .table-wrap { overflow-x: auto; margin-bottom: 32px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dim);
      border-bottom: 1px solid var(--gold-b);
      white-space: nowrap;
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .td-name { font-weight: 600; color: var(--text); }
    .td-dim  { color: var(--dim); font-size: 12px; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .pill-green  { background: rgba(29,158,117,0.15); color: #3fb950; border: 1px solid rgba(29,158,117,0.3); }
    .pill-amber  { background: rgba(210,153,34,0.15);  color: var(--amber); border: 1px solid rgba(210,153,34,0.3); }
    .pill-dim    { background: rgba(255,255,255,0.05); color: var(--dim); border: 1px solid rgba(255,255,255,0.08); }

    .btn-sm {
      background: var(--gold-d);
      border: 1px solid var(--gold-b);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-sm:hover { background: rgba(201,168,76,0.25); }

    /* ── Heatmap ── */
    .heatmap { margin-bottom: 32px; }

    .heatmap-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .heatmap-label {
      width: 160px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .heatmap-bar-wrap { flex: 1; display: flex; gap: 3px; height: 18px; }

    .heatmap-seg {
      height: 100%;
      border-radius: 3px;
      min-width: 2px;
      transition: width 0.3s;
    }

    .heatmap-seg--completed { background: #3fb950; }
    .heatmap-seg--struggled { background: var(--amber); }
    .heatmap-seg--abandoned { background: rgba(196,119,119,0.5); }

    .heatmap-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      font-size: 12px;
    }

    .heatmap-legend-item { display: flex; align-items: center; gap: 6px; color: var(--dim); }
    .heatmap-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* ── Learner drill-down ── */
    .drilldown {
      background: var(--surface);
      border: 1px solid var(--gold-b);
      border-radius: 10px;
      padding: 20px;
      margin-top: 28px;
    }

    .drilldown__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .drilldown__name { font-size: 16px; font-weight: 700; color: var(--gold); }
    .drilldown__close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .drilldown__close:hover { color: var(--text); background: none; }

    .weakspot-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }

    .weakspot-lesson { flex: 1; color: var(--text); }
    .weakspot-event  { color: var(--dim); font-size: 12px; flex: 1; }
    .weakspot-count  { font-weight: 700; color: var(--red); min-width: 40px; text-align: right; }

    /* ── Empty / loading states ── */
    .empty { color: var(--dim); font-size: 13px; padding: 24px 0; text-align: center; }
    .loading { color: var(--dim); font-size: 13px; padding: 16px 0; }

    .error-msg { color: var(--red); font-size: 13px; padding: 12px 0; }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen" class="auth">
  <div class="auth__logo">🦉</div>
  <div class="auth__title">Athena Dashboard</div>
  <div class="auth__sub">Instructor access only</div>
  <div class="auth__form">
    <input type="password" id="secret-input" placeholder="enter dashboard secret" autocomplete="off" />
    <button onclick="doLogin()">sign in</button>
    <div id="auth-error" class="error-msg" style="display:none">incorrect secret</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <span class="auth__logo" style="font-size:20px">🦉</span>
    <span class="topbar__brand">Athena Dashboard</span>
    <span class="topbar__sep">|</span>
    <div class="topbar__cohort-row">
      <input id="cohort-input" type="text" placeholder="cohort code e.g. BATCH1" onkeydown="if(event.key==='Enter')loadCohort()" />
      <button onclick="loadCohort()">load</button>
    </div>
    <button class="topbar__logout" onclick="doLogout()">sign out</button>
  </div>

  <div class="main" id="main-content">
    <div class="empty">Enter a cohort code above to load data.</div>
  </div>
</div>

<script>
const WORKER = ''
const SECRET_KEY = 'athena_dash_secret'
const TOTAL_LESSONS = 13

let secret = sessionStorage.getItem(SECRET_KEY) || ''
let currentLearner = null

function authHeaders() {
  return { 'Authorization': `Bearer ${secret}`, 'Content-Type': 'application/json' }
}

async function apiFetch(path) {
  const res = await fetch(WORKER + path, { headers: authHeaders() })
  if (res.status === 401) { doLogout(); return null }
  if (!res.ok) return null
  return res.json()
}

function doLogin() {
  const val = document.getElementById('secret-input').value.trim()
  if (!val) return
  secret = val
  sessionStorage.setItem(SECRET_KEY, secret)
  // Verify with a quick ping
  fetch(WORKER + '/dashboard/cohort/_verify_', { headers: authHeaders() }).then(r => {
    if (r.status === 401) {
      document.getElementById('auth-error').style.display = 'block'
      secret = ''
      sessionStorage.removeItem(SECRET_KEY)
    } else {
      document.getElementById('auth-screen').style.display = 'none'
      document.getElementById('app').classList.add('visible')
    }
  }).catch(() => {
    // Worker reachable but auth check passed (even 404 means not 401)
    document.getElementById('auth-screen').style.display = 'none'
    document.getElementById('app').classList.add('visible')
  })
}

function doLogout() {
  sessionStorage.removeItem(SECRET_KEY)
  secret = ''
  document.getElementById('auth-screen').style.display = 'flex'
  document.getElementById('app').classList.remove('visible')
}

function relativeTime(ts) {
  if (!ts) return '—'
  const diff = Date.now() - ts
  const m = Math.floor(diff / 60000)
  if (m < 2) return 'just now'
  if (m < 60) return `${m}m ago`
  const h = Math.floor(m / 60)
  if (h < 24) return `${h}h ago`
  const d = Math.floor(h / 24)
  return `${d}d ago`
}

function progressPill(done) {
  const pct = Math.round((done / TOTAL_LESSONS) * 100)
  if (pct === 100) return `<span class="pill pill-green">complete</span>`
  if (pct > 0)     return `<span class="pill pill-amber">${done}/${TOTAL_LESSONS}</span>`
  return `<span class="pill pill-dim">0/${TOTAL_LESSONS}</span>`
}

async function loadCohort() {
  const code = document.getElementById('cohort-input').value.trim().toUpperCase()
  if (!code) return
  const main = document.getElementById('main-content')
  main.innerHTML = '<div class="loading">loading…</div>'

  const [cohortData, heatmapData] = await Promise.all([
    apiFetch(`/dashboard/cohort/${code}`),
    apiFetch(`/dashboard/cohort/${code}/heatmap`),
  ])

  if (!cohortData) { main.innerHTML = '<div class="error-msg">Failed to load cohort data.</div>'; return }

  let html = ''

  // Stat cards
  html += `
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-card__val">${cohortData.learner_count}</div>
        <div class="stat-card__label">learners</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__val">${cohortData.completion_pct}%</div>
        <div class="stat-card__label">avg completion</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__val">${TOTAL_LESSONS}</div>
        <div class="stat-card__label">total lessons</div>
      </div>
    </div>
  `

  // Heatmap
  if (heatmapData?.rows?.length) {
    html += `
      <div class="section-title">lesson heatmap — ${code}</div>
      <div class="heatmap-legend">
        <div class="heatmap-legend-item"><div class="heatmap-legend-dot" style="background:#3fb950"></div>completed</div>
        <div class="heatmap-legend-item"><div class="heatmap-legend-dot" style="background:#d29922"></div>struggled</div>
        <div class="heatmap-legend-item"><div class="heatmap-legend-dot" style="background:rgba(196,119,119,0.5)"></div>abandoned</div>
      </div>
      <div class="heatmap">
    `
    const total = cohortData.learner_count || 1
    for (const row of heatmapData.rows) {
      const cPct = Math.round((row.completed / total) * 100)
      const sPct = Math.round((row.struggled / total) * 100)
      const aPct = Math.round((row.abandoned / total) * 100)
      html += `
        <div class="heatmap-row">
          <div class="heatmap-label">${row.lesson}</div>
          <div class="heatmap-bar-wrap">
            ${cPct ? `<div class="heatmap-seg heatmap-seg--completed" style="width:${cPct}%" title="${row.completed} completed"></div>` : ''}
            ${sPct ? `<div class="heatmap-seg heatmap-seg--struggled" style="width:${sPct}%" title="${row.struggled} struggled"></div>` : ''}
            ${aPct ? `<div class="heatmap-seg heatmap-seg--abandoned" style="width:${aPct}%" title="${row.abandoned} abandoned"></div>` : ''}
          </div>
          <span class="td-dim" style="min-width:60px;text-align:right">${cPct}% done</span>
        </div>
      `
    }
    html += '</div>'
  }

  // Learner table
  html += `<div class="section-title">learners — ${code}</div>`
  if (!cohortData.learners?.length) {
    html += '<div class="empty">No learners have joined this cohort yet.</div>'
  } else {
    html += `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>name</th>
              <th>progress</th>
              <th>last seen</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
    `
    for (const l of cohortData.learners) {
      html += `
        <tr>
          <td class="td-name">${l.display_name || '<em style="color:var(--dim)">anonymous</em>'}</td>
          <td>${progressPill(l.lessons_done)}</td>
          <td class="td-dim">${relativeTime(l.last_seen)}</td>
          <td><button class="btn-sm" onclick="loadLearner('${l.id}','${l.display_name || 'Learner'}')">drill down</button></td>
        </tr>
      `
    }
    html += '</tbody></table></div>'
  }

  main.innerHTML = html
}

async function loadLearner(id, name) {
  const [learnerData, weakspotData] = await Promise.all([
    apiFetch(`/dashboard/learner/${id}`),
    apiFetch(`/dashboard/learner/${id}/weakspots`),
  ])

  if (!learnerData) return

  // Remove existing drilldown if any
  const existing = document.getElementById('drilldown-panel')
  if (existing) existing.remove()

  const ws = weakspotData?.weakspots || []

  let html = `
    <div class="drilldown" id="drilldown-panel">
      <div class="drilldown__header">
        <div class="drilldown__name">${name}</div>
        <span class="td-dim" style="font-size:12px">${learnerData.stats.lessons_done}/${TOTAL_LESSONS} lessons · last seen ${relativeTime(learnerData.stats.last_seen)}</span>
        <button class="drilldown__close" onclick="document.getElementById('drilldown-panel').remove()">×</button>
      </div>
  `

  if (!ws.length) {
    html += '<div class="empty" style="text-align:left;padding:8px 0">No weak spots detected yet.</div>'
  } else {
    html += '<div class="section-title" style="margin-bottom:10px">weak spots — steps failed most</div>'
    for (const w of ws) {
      html += `
        <div class="weakspot-row">
          <div class="weakspot-lesson">${w.lesson}</div>
          <div class="weakspot-event">${w.event}</div>
          <div class="weakspot-count">${w.fail_count}×</div>
        </div>
      `
    }
  }

  html += '</div>'

  document.getElementById('main-content').insertAdjacentHTML('beforeend', html)
  document.getElementById('drilldown-panel').scrollIntoView({ behavior: 'smooth', block: 'start' })
}

// Auto-login if secret in sessionStorage
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin()
  })
  if (secret) {
    document.getElementById('auth-screen').style.display = 'none'
    document.getElementById('app').classList.add('visible')
  }
})
</script>
</body>
</html>
